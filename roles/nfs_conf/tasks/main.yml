---
- name: Validate NFS vars
  ansible.builtin.assert:
    that:
      - infrastructure is defined
      - infrastructure.nfs_server is defined
      - infrastructure.nfs_server.ip is defined
      - nfs_vm_storage is defined
      - nfs_vm_storage.mount_path is defined
      - nfs_vm_storage.export_path is defined
      - nfs_vm_storage.vg_name is defined
      - nfs_vm_storage.lv_name is defined
    fail_msg: "Missing required NFS vars."

- name: Install NFS packages
  ansible.builtin.dnf:
    name:
      - nfs-utils
    state: present

- name: Create export filesystem mountpoint
  ansible.builtin.file:
    path: "{{ nfs_vm_storage.mount_path }}"
    state: directory
    mode: "0755"

- name: Mount logical volume
  ansible.builtin.mount:
    path: "{{ nfs_vm_storage.mount_path }}"
    src: "/dev/{{ nfs_vm_storage.vg_name }}/{{ nfs_vm_storage.lv_name }}"
    fstype: "{{ nfs_vm_storage.fs_type | default('xfs') }}"
    state: mounted

- name: Ensure export path exists
  ansible.builtin.file:
    path: "{{ nfs_vm_storage.export_path }}"
    state: directory
    mode: "0755"

- name: Configure /etc/exports for lab subnet
  ansible.builtin.lineinfile:
    path: /etc/exports
    line: "{{ nfs_vm_storage.export_path }} {{ network.base }}.0/{{ network.prefix }}(rw,sync,no_root_squash,no_subtree_check)"
    create: true

- name: Reload exports
  ansible.builtin.command: exportfs -ra
  changed_when: true

- name: Start and enable nfs-server
  ansible.builtin.systemd:
    name: nfs-server
    state: started
    enabled: true

- name: Verify NFS service port
  ansible.builtin.wait_for:
    port: 2049
    host: "{{ infrastructure.nfs_server.ip }}"
    timeout: 30
