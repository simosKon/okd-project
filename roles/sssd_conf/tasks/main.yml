---
- name: Install AD/SSSD prerequisite packages
  dnf:
    name:
      - realmd
      - adcli
      - sssd
      - oddjob
      - oddjob-mkhomedir
      - krb5-workstation
    state: present
  tags: packages

- name: Check if host is already joined to the domain
  command: realm list
  register: realm_status
  changed_when: false

- name: Generate krb5.conf from template
  template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
  tags: config

- name: Join domain (only if not already joined)
  command: >
    realm join {{ sssd_svc.domain_name }} --user={{ ad_admin_user }} --install=/ --membership-software=adcli
  args:
    stdin: "{{ ad_admin_password }}"
  register: realm_join
  no_log: true
  changed_when: "'successfully joined' in (realm_join.stdout | default(''))"
  failed_when: >
    realm_join.rc != 0 and
    ('already joined' not in (realm_join.stdout | default(''))) and
    ('already joined' not in (realm_join.stderr | default('')))
  when: "('domain-name: ' ~ sssd_svc.domain_name) not in (realm_status.stdout | default(''))"
  tags: join

- name: Check if sssd.conf exists
  stat:
    path: /etc/sssd/sssd.conf
  register: sssd_conf

- name: Backup original sssd.conf
  copy:
    src: /etc/sssd/sssd.conf
    dest: /etc/sssd/sssd.conf.backup
    backup: yes
    force: no
    remote_src: yes
  when: sssd_conf.stat.exists
  tags: backup

- name: Generate sssd.conf from template
  template:
    src: sssd.conf.j2
    dest: /etc/sssd/sssd.conf
    owner: root
    group: root
    mode: '0600'
    backup: yes
  tags: config

- name: Set permissions on keytab
  file:
    path: /etc/krb5.keytab
    owner: root
    group: root
    mode: '0600'
  tags: config

- name: Ensure SSSD is started and enabled
  service:
    name: sssd
    state: started
    enabled: yes
  tags: service

- name: Configure PAM to use SSSD
  pamd:
    name: system-auth
    type: auth
    control: sufficient
    module_path: pam_sss.so
    module_arguments: nullok
    state: args_present
  tags: pam

- name: Configure NSS to use SSSD for passwd
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^passwd:'
    line: 'passwd:     files sss'
    backrefs: yes
  tags: nss

- name: Configure NSS to use SSSD for group
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^group:'
    line: 'group:      files sss'
    backrefs: yes
  tags: nss

- name: Configure NSS to use SSSD for shadow
  lineinfile:
    path: /etc/nsswitch.conf
    regexp: '^shadow:'
    line: 'shadow:     files sss'
    backrefs: yes
  tags: nss

- name: Ensure pam_mkhomedir is present
  lineinfile:
    path: /etc/pam.d/system-auth
    insertafter: 'session\s+required\s+pam_limits.so'
    line: 'session    required     pam_mkhomedir.so skel=/etc/skel/ umask=0077'
  tags: pam

- name: Restart SSSD to apply changes
  service:
    name: sssd
    state: restarted
  tags: service
