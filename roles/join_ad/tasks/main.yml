---
- name: Install realmd and sssd
  dnf:
    name: [ realmd, adcli, sssd, oddjob, oddjob-mkhomedir, krb5-workstation ]
    state: present

- name: Check if host is already joined to the domain
  command: realm list
  register: realm_status
  changed_when: false

- name: Generate krb5.conf from template
  template:
    src: krb5.conf.j2
    dest: /etc/krb5.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
  tags: config

- name: Join domain
  command: >
    realm join {{ sssd_svc.domain_name }} --user={{ ad_admin_user }} --install=/ --membership-software=adcli
  args:
    stdin: "{{ ad_admin_password }}"
  register: realm_join
  failed_when: "'already joined' not in realm_join.stdout and 'successfully joined' not in realm_join.stdout"
  no_log: true
  when: "'domain-name: {{ sssd_svc.domain_name }}' not in realm_status.stdout"
  tags: join

- name: Verify domain join
  command: realm list
  register: verify_realm
  changed_when: false
  when: "'domain-name: {{ sssd_svc.domain_name }}' not in realm_status.stdout"
  tags: verify